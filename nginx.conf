server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # React SPA routing — all unknown paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the Spring Boot backend
    # In Kubernetes: backend service name will be used
    # For local Docker testing: set BACKEND_HOST via env or docker network
    location /api/ {
        proxy_pass http://wso2-notifier-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Disable caching for index.html (always fresh)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
